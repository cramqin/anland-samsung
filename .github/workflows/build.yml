name: Build APK and Daemon

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so `git rev-list --count HEAD` yields the real commit
          # count for versionCode (shallow checkout would make it always 1).
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools build-tools;34.0.0 ndk;29.0.13113456"
          accept-android-sdk-licenses: true

      - name: Set NDK_DIR environment variable
        run: echo "NDK_DIR=$ANDROID_HOME/ndk/29.0.13113456" >> $GITHUB_ENV

      - name: Setup Android Signing
        run: |
          mkdir -p $HOME/.android
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "Using repository release secrets for signing"
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > $HOME/.android/release.keystore
          else
            echo "No release secrets found, generating debug keystore"
            keytool -genkeypair -v -keystore $HOME/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug, O=Android, C=US" -noprompt
          fi

      - name: Build APK
        working-directory: consumers/anland_v5/android_consumer
        run: |
          chmod +x gradlew
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$HOME/.android/release.keystore" \
              -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
              -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"
          else
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$HOME/.android/debug.keystore" \
              -Pandroid.injected.signing.store.password=android \
              -Pandroid.injected.signing.key.alias=androiddebugkey \
              -Pandroid.injected.signing.key.password=android
          fi
          cp app/build/outputs/apk/release/app-release.apk ../../../anland-v5.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: anland-v5
          path: anland-v5.apk

      - name: Build APK (Landscape)
        working-directory: consumers/anland_v5/android_consumer
        run: |
          # Save a copy of the original manifest
          cp app/src/main/AndroidManifest.xml app/src/main/AndroidManifest.xml.bak
          sed -i 's/android:screenOrientation="fullSensor"/android:screenOrientation="sensorLandscape"/g' app/src/main/AndroidManifest.xml
          ./gradlew clean assembleRelease
          cp app/build/outputs/apk/release/app-release.apk ../../../anland-v5-landscape.apk
          # Restore the original manifest so the build directory has the correct state
          mv app/src/main/AndroidManifest.xml.bak app/src/main/AndroidManifest.xml

      - name: Upload APK (Landscape)
        uses: actions/upload-artifact@v7
        with:
          name: anland-v5-landscape
          path: anland-v5-landscape.apk

      - name: Configure CMake for Android
        run: |
          cmake -S . -B build_daemon_android \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_DIR/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-30 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build display_daemon
        run: cmake --build build_daemon_android --target display_daemon -j$(nproc)

      - name: Copy daemon to magisk_module directory
        run: |
          cp build_daemon_android/display_daemon magisk_module/
          chmod 755 magisk_module/display_daemon

      - name: Zip Magisk module
        run: |
          cd magisk_module
          zip -r ../anland-daemon.zip .

      - name: Upload Magisk module
        uses: actions/upload-artifact@v7
        with:
          name: anland-daemon
          path: magisk_module/

      - name: Create Release and Upload Assets
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: latest
          name: "Latest Build"
          body: "Automated build of the latest commit on main branch."
          prerelease: true
          artifacts: "anland-v5.apk,anland-v5-landscape.apk,anland-daemon.zip"
          token: ${{ secrets.GITHUB_TOKEN }}